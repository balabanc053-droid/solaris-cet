name: Lighthouse CI — Quality Gate

# Run on every pull request targeting `main`.
# Blocks merge if Performance, Accessibility, Best Practices, or SEO fall below thresholds.
on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────────────
  build:
    name: Build app for audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Restore Vite build cache
        uses: actions/cache@v4
        with:
          path: app/node_modules/.vite
          key: vite-cache-${{ runner.os }}-${{ hashFiles('app/package-lock.json', 'app/vite.config.ts') }}
          restore-keys: |
            vite-cache-${{ runner.os }}-

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build application
        working-directory: app
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: app/dist
          retention-days: 1

  # ── 2. Lighthouse CI ──────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse audit (≥ 85 required)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: app/dist

      - name: Run Lighthouse CI
        working-directory: app
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx @lhci/cli@0.15.1 autorun --config=lighthouserc.cjs

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: app/.lighthouseci
          retention-days: 30
          if-no-files-found: warn

  # ── 3. E2E Tests ─────────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: app
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        working-directory: app
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: app/dist

      - name: Run Playwright E2E tests
        working-directory: app
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report
          retention-days: 30
