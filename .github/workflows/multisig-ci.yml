name: Multi-Sig Contract CI

on:
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/multisig-ci.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/multisig-ci.yml"

jobs:
  build-and-test:
    name: Build & Test MultiSigWrapper
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Compile Tact contract
        run: npx blueprint build MultiSigWrapper

      - name: Run test suite
        run: npm test -- --ci --forceExit

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: multisig-build
          path: contracts/build/
          retention-days: 7
