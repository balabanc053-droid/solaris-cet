name: Resolve PR Branch Conflicts

on:
  workflow_dispatch:
    inputs:
      branches:
        description: 'Comma-separated list of branches to rebase onto main (e.g. "copilot/improve-ai-agents-resource-list,copilot/resolve-agent-issues")'
        required: false
        default: 'copilot/improve-ai-agents-resource-list,copilot/resolve-agent-issues'

permissions:
  contents: write

jobs:
  rebase-branches:
    name: Rebase conflicted branches onto main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase each branch onto main
        run: |
          IFS=',' read -ra BRANCHES <<< "${{ github.event.inputs.branches }}"
          for branch in "${BRANCHES[@]}"; do
            branch="${branch// /}"  # trim whitespace
            echo "=== Processing branch: $branch ==="

            if ! git ls-remote --exit-code origin "refs/heads/$branch" > /dev/null 2>&1; then
              echo "Branch '$branch' does not exist on origin — skipping."
              continue
            fi

            git fetch origin "$branch"
            git checkout -B "$branch" "origin/$branch"

            # Try to rebase onto main
            if git rebase origin/main; then
              echo "Rebase succeeded for $branch"
              git push origin "$branch" --force-with-lease
              echo "Pushed resolved $branch"
            else
              echo "Rebase had conflicts for $branch — aborting and using merge strategy"
              git rebase --abort || true

              # Fall back to merge with ours strategy for conflicting files
              git checkout -B "$branch" "origin/$branch"
              git merge origin/main --no-edit -X ours -m \
                "fix: merge main into $branch — resolve conflicts keeping main's version"
              git push origin "$branch" --force-with-lease
              echo "Merged (ours) and pushed $branch"
            fi
          done
